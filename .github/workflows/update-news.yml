name: Update News & Military Data

on:
  schedule:
    - cron: '0 * * * *'   # Every hour at :00 UTC — change to '0 */2 * * *' for every 2h, etc.
  workflow_dispatch:
    inputs:
      conflict_id:
        description: 'Specific conflict ID to update (leave blank for all 7 conflicts)'
        required: false
        default: ''
      skip_news:
        description: 'Skip news update (true/false)'
        required: false
        default: 'false'
      skip_military:
        description: 'Skip military data update (true/false)'
        required: false
        default: 'false'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update news data
        if: ${{ github.event.inputs.skip_news != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONFLICT_ID: ${{ github.event.inputs.conflict_id }}
        run: node scripts/update-news.js

      - name: Update military data
        if: ${{ github.event.inputs.skip_military != 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-military.js

      - name: Commit updated data
        run: |
          git config user.name  "2sides-bot"
          git config user.email "bot@2sides-data"
          git add news/ military/ manifest.json
          git diff --staged --quiet || git commit -m "chore: update data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
