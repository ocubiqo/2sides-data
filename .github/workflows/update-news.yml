name: Update News Data

on:
  schedule:
    - cron: '0 0 * * *'   # Every 24 hours at midnight UTC
  workflow_dispatch:
    inputs:
      conflict_id:
        description: 'Specific conflict ID to update (leave blank for all 7)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update news data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONFLICT_ID: ${{ github.event.inputs.conflict_id }}
        run: node scripts/update-news.js

      - name: Commit updated data
        run: |
          git config user.name  "2sides-bot"
          git config user.email "bot@2sides-data"
          git add news/ manifest.json
          git diff --staged --quiet || git commit -m "chore: update news $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
