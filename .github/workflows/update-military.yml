name: Update Military Data

on:
  schedule:
    - cron: '0 0 * * 0'   # Every 7 days — Sundays at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Update military data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-military.js

      - name: Commit updated data
        run: |
          git config user.name  "2sides-bot"
          git config user.email "bot@2sides-data"
          git add military/ manifest.json
          git diff --staged --quiet || git commit -m "chore: update military data $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
